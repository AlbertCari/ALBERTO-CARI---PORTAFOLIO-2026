<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Proyecto</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>

<body>

  <main class="container">

    <section
      class="detail-page"
      id="detail-page"
    ></section>

  </main>

  <script src="js/data.js"></script>

  <script>

    const params =
      new URLSearchParams(
        window.location.search
      );

    const id =
      Number(params.get("id"));

    const item =
      portfolioItems.find(
        p => p.id === id
      );

    const detail =
      document.getElementById(
        "detail-page"
      );

    detail.innerHTML = `

      <img
        src="${item.image}"
        alt="${item.title}"
        style="
          width:100%;
          border-radius:20px;
        "
      >

      <h1>
        ${item.title}
      </h1>

      <p>
        ${item.description}
      </p>

    `;

  </script>

</body>
</html>
